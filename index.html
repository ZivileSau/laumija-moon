<!DOCTYPE html>
<html lang="lt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Laumijos mėnulis</title>

<style>
body{
margin:0;
padding:20px;
background:#111;
color:white;
font-family:sans-serif;
}

h1{
font-size:32px;
margin-bottom:20px;
}

#calendar{
display:grid;
grid-template-columns:repeat(7,1fr);
gap:10px;
}

.day{
background:#1d1d1d;
border-radius:16px;
padding:12px 6px;
text-align:center;
}

.day img{
width:38px;
height:38px;
display:block;
margin:0 auto 6px;
}

.date{
font-size:14px;
opacity:.7;
}

.phase{
font-size:12px;
margin-top:4px;
}

</style>
</head>

<body>

<h1>Laumijos mėnulis</h1>

<div id="calendar">
Kraunasi...
</div>

<script>

const API_KEY = "7ab91d518b018d23a3bbd9564998e89f0c3209aab9c165e623ca665b41d4e357";

const year = new Date().getFullYear();
const month = new Date().getMonth()+1;

fetch(`https://api.freeastroapi.com/api/v1/moon/month?year=${year}&month=${month}`,{
headers:{
"x-api-key":API_KEY
}
})
.then(res=>res.json())
.then(data=>{

const calendar=document.getElementById("calendar");
calendar.innerHTML="";

data.days.forEach(day=>{

const el=document.createElement("div");
el.className="day";

el.innerHTML=`
<img src="${day.svg}" alt="">
<div class="date">${day.day}</div>
<div class="phase">${day.phase}</div>
`;

calendar.appendChild(el);

});

})
.catch(err=>{

document.getElementById("calendar").innerHTML=
"Klaida kraunant mėnulio kalendorių";

console.log(err);

});

</script>

</body>
</html>
