<!DOCTYPE html>
<html lang="lt">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Laumijos mėnulis</title>

<style>

body{
margin:0;
padding:20px;
background:#0f0f0f;
font-family:sans-serif;
color:white;
}

.wrapper{
max-width:500px;
margin:0 auto;
}

h1{
font-size:42px;
margin-bottom:20px;
font-weight:700;
}

.card{
background:#1b1b1b;
border-radius:28px;
padding:28px;
text-align:center;
box-shadow:0 10px 30px rgba(0,0,0,.35);
}

.moon{
font-size:90px;
line-height:1;
margin-bottom:16px;
}

.phase{
font-size:28px;
font-weight:600;
margin-bottom:10px;
}

.info{
font-size:16px;
opacity:.75;
margin-top:6px;
}

.loading{
opacity:.6;
text-align:center;
padding:40px;
}

</style>
</head>

<body>

<div class="wrapper">

<h1>Laumijos mėnulis</h1>

<div id="calendar" class="loading">
Kraunasi...
</div>

</div>

<script>

fetch("https://api.phaseofthemoontoday.com/v1/current")

.then(res => res.json())

.then(data => {

document.getElementById("calendar").innerHTML = `

<div class="card">

<div class="moon">
${data.emoji || "🌙"}
</div>

<div class="phase">
${data.phase || "Mėnulio fazė"}
</div>

<div class="info">
Apšvietimas: ${data.illumination || 0}%
</div>

</div>

`;

})

.catch(err => {

document.getElementById("calendar").innerHTML = `

<div class="card">

<div class="moon">
🌙
</div>

<div class="phase">
Nepavyko užkrauti mėnulio
</div>

<div class="info">
API klaida
</div>

</div>

`;

console.log(err);

});

</script>

</body>
</html>
